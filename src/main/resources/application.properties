spring.web.cors.allowed-origins=http://localhost:5173
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Logs SQL (opcional)
spring.jpa.show-sql=true